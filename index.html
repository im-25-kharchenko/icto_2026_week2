<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
	</head>
	<body>
		<a-scene stats>
		<a-sky color="grey"></a-sky>
		
		<a-plane width="9" height="2" position="3 1 -9"></a-plane>
		<a-text value="Харченко" color="black" width="10" position="-0.5 1 -6" font="/fonts/times-msdf.json" negate="false"></a-text>
		
		<a-torus position="-2 1 -5" color="#FFD700" radius="1.2" animation="property: material.color; from: #FFD700; to: #00FF00; dur: 1000; loop: true"></a-torus>
		<a-cylinder position="2 -1 -5" radius="0.5" height="1.5" color="#00BFFF" animation="property: rotation; to: 360 0 0; dur: 1000; loop: true"></a-cylinder>
		<a-entity animation="property: scale; from: 1 1 1; to: 4 4 4; dur: 30000; delay: 500">
			<a-torus position="-2 1 -5" color="#FFD700" radius="1.2" animation="property: material.color; from: #FFD700; to: #00FF00; dur: 1000; loop: true"></a-torus>
		</a-entity>
		
		<a-sphere position="7 2 -4" radius="1" src="#tex-ryan" animation="property: rotation; to: 0 360 0; dur: 1000; loop: true"></a-sphere>
		
		<a-entity 
			position="2.5 3 -5" 
			scale="1 1 1" 
			rotation="0 -90 0"
			gltf-model="#mod-neco">
		</a-entity>
		
		<a-entity position="0 5 -5">
			<a-sphere position="0 0 0" radius="1" color="red"></a-sphere>
			<a-cylinder position="0 -1.5 0" height="1" radius="0.5" color="blue"></a-cylinder>
		</a-entity>
		</a-scene>
	</body>
</html>
